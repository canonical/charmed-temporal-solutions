# .github/workflows/terraform-checks.yaml
name: Terraform checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  pull_request:
  workflow_call:

jobs:
  pull-request-terraform-checks:
    name: PR Terraform checks
    uses: canonical/workflows-team/.github/workflows/terraform.yaml@main
    with:
      module-directory: ./modules/charmed-temporal
      just-targets: '["test", "test-cos", "test-cos-existing"]'
      timeout-minutes: 120
